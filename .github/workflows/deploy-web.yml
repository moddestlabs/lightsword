name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      
      - name: Get dependencies (bible_core)
        working-directory: ./bible_core
        run: flutter pub get
      
      - name: Get dependencies (bible_app)
        working-directory: ./bible_app
        run: flutter pub get
      
      - name: Test bible_core
        working-directory: ./bible_core
        run: dart test
      
      - name: Build web
        working-directory: ./bible_app
        run: flutter build web --release --base-href /

      - name: Generate PWA service worker
        working-directory: ./bible_app
        run: ../scripts/generate_pwa_service_worker.sh build/web
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./bible_app/build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
